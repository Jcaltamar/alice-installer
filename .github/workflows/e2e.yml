name: E2E

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "scripts/e2e/**"
      - "internal/headless/**"
      - "cmd/installer/**"

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Run E2E harness
        run: ./scripts/e2e/run.sh

      - name: Upload installer binary on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: alice-installer-e2e
          path: dist/alice-installer-e2e
          retention-days: 7
